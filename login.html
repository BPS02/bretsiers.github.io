<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bret Siers Music</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="theme-color" content="#c0a060">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #020810;
      color: #fff;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    #starfield canvas { display: block; width: 100%; height: 100%; }

    .auth-container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 80px 20px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #c0a060;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #1a1200, #2a1f0a);
    }

    .auth-logo span {
      font-size: 1.6em;
      font-weight: bold;
      color: #c0a060;
      letter-spacing: 3px;
    }

    .auth-title {
      font-size: 1.8em;
      color: #c0a060;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 30px;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      width: 100%;
      max-width: 360px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.85em;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab:first-child { border-radius: 8px 0 0 8px; }
    .auth-tab:last-child { border-radius: 0 8px 8px 0; }

    .auth-tab.active {
      color: #c0a060;
      background: rgba(192,160,96,0.08);
      border-color: rgba(192,160,96,0.3);
    }

    .auth-form {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .auth-form input, .auth-form select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(192,160,96,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95em;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-form input:focus, .auth-form select:focus {
      border-color: #c0a060;
    }

    .auth-form input::placeholder { color: #444; }

    .auth-form select {
      color: #444;
      cursor: pointer;
    }

    .auth-form select option {
      background: #0a0f1a;
      color: #fff;
    }

    .auth-form select.selected { color: #fff; }

    .auth-btn {
      padding: 14px;
      background: linear-gradient(135deg, #c0a060, #a08040);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 6px;
    }

    .auth-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(192,160,96,0.3);
    }

    .auth-error {
      color: #e74c3c;
      font-size: 0.85em;
      text-align: center;
      min-height: 20px;
    }

    .auth-link {
      color: #666;
      font-size: 0.85em;
      margin-top: 20px;
    }

    .auth-link a {
      color: #c0a060;
      text-decoration: none;
      border-bottom: 1px solid rgba(192,160,96,0.3);
    }

    .back-link {
      position: absolute;
      top: 30px;
      left: 20px;
      color: #888;
      text-decoration: none;
      font-size: 0.9em;
      border-bottom: 1px solid #555;
      z-index: 1;
    }

    .back-link:hover { color: #c0a060; }

    .signup-fields { display: none; }
    .signup-fields.visible { display: contents; }
  </style>
</head>
<body>

  <div id="starfield"><canvas id="starfield-canvas"></canvas></div>

  <a class="back-link" href="index.html">&larr; Back to Music</a>

  <div class="auth-container">
    <div class="auth-logo"><span>BPS</span></div>
    <h1 class="auth-title">Welcome</h1>
    <p class="auth-subtitle">Sign in to join the crew</p>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showTab('login')">Login</div>
      <div class="auth-tab" onclick="showTab('signup')">Sign Up</div>
    </div>

    <form class="auth-form" onsubmit="handleSubmit(event)">
      <input type="text" id="username" placeholder="Username" autocomplete="username" required>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>

      <div class="signup-fields" id="signup-fields">
        <input type="text" id="displayName" placeholder="Display name">
        <select id="crewSelect" onchange="this.classList.toggle('selected', this.value)">
          <option value="">Choose your crew</option>
          <option value="Content Creators">Content Creators</option>
          <option value="Streamers">Streamers</option>
          <option value="Advantage">Advantage</option>
          <option value="Events">Events</option>
          <option value="Teachers">Teachers</option>
          <option value="Jobs">Jobs</option>
        </select>
      </div>

      <p class="auth-error" id="auth-error"></p>
      <button type="submit" class="auth-btn" id="auth-btn">Login</button>
    </form>

    <p class="auth-link" id="auth-switch">
      Don't have an account? <a href="#" onclick="showTab('signup'); return false;">Sign up</a>
    </p>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (AUTH.isLoggedIn()) {
      window.location.href = "feed.html";
    }

    let mode = "login";

    function showTab(tab) {
      mode = tab;
      document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      document.getElementById("signup-fields").classList.toggle("visible", tab === "signup");
      document.getElementById("auth-btn").textContent = tab === "login" ? "Login" : "Create Account";
      document.getElementById("auth-switch").innerHTML = tab === "login"
        ? 'Don\'t have an account? <a href="#" onclick="showTab(\'signup\'); return false;">Sign up</a>'
        : 'Already have an account? <a href="#" onclick="showTab(\'login\'); return false;">Login</a>';
      document.getElementById("auth-error").textContent = "";
    }

    function handleSubmit(e) {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("auth-error");

      if (mode === "login") {
        const result = AUTH.login(username, password);
        if (result.success) {
          window.location.href = "feed.html";
        } else {
          errorEl.textContent = result.error;
        }
      } else {
        const displayName = document.getElementById("displayName").value || username;
        const crew = document.getElementById("crewSelect").value;
        const result = AUTH.signup(username, password, displayName, crew);
        if (result.success) {
          window.location.href = "profile.html";
        } else {
          errorEl.textContent = result.error;
        }
      }
    }
  </script>

  <script>
    (function() {
      const canvas = document.getElementById("starfield-canvas");
      const ctx = canvas.getContext("2d");
      let width, height, stars;
      const STAR_COUNT = 300, SPEED = 0.35;
      function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) stars.push(createStar(true));
      }
      function createStar(randomZ) {
        return {
          x: (Math.random() - 0.5) * width * 2, y: (Math.random() - 0.5) * height * 2,
          z: randomZ ? Math.random() * 1000 : 1000, size: Math.random() * 1.5 + 0.5,
          twinkle: Math.random() * Math.PI * 2, twinkleSpeed: Math.random() * 0.02 + 0.005,
          color: Math.random() > 0.85 ? `hsl(${Math.floor(Math.random()*60+200)},60%,80%)` : "#fff"
        };
      }
      function animate() {
        ctx.fillStyle = "rgba(2,8,16,0.85)";
        ctx.fillRect(0, 0, width, height);
        const cx = width/2, cy = height/2;
        for (let i = 0; i < stars.length; i++) {
          const s = stars[i]; s.z -= SPEED; s.twinkle += s.twinkleSpeed;
          if (s.z <= 0) { stars[i] = createStar(false); continue; }
          const sx = (s.x/s.z)*200+cx, sy = (s.y/s.z)*200+cy;
          if (sx<-50||sx>width+50||sy<-50||sy>height+50) { stars[i]=createStar(false); continue; }
          const scale = (1000-s.z)/1000, r = s.size*scale*2;
          const alpha = scale*(0.6+0.4*Math.sin(s.twinkle));
          ctx.beginPath(); ctx.arc(sx,sy,Math.max(r,0.3),0,Math.PI*2);
          ctx.fillStyle=s.color; ctx.globalAlpha=alpha; ctx.fill();
          if (r>1.2) { ctx.beginPath(); ctx.arc(sx,sy,r*2.5,0,Math.PI*2); ctx.globalAlpha=alpha*0.1; ctx.fill(); }
        }
        ctx.globalAlpha=1; requestAnimationFrame(animate);
      }
      init(); animate();
      window.addEventListener("resize", () => { width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; });
    })();
  </script>
</body>
</html>
